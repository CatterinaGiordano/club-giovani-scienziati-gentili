<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Club degli Scienziati Gentili</title>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; padding: 40px; background: #f5f5f5; color: #222;">

<h1>Club degli Scienziati Gentili</h1>

<p>Non serve iscrizione.</p>
<p>Non serve permesso.</p>
<p><strong>Serve solo una cosa:</strong></p>

<h2>non smettere di guardare davvero</h2>

<hr style="margin: 40px 0;">

<h3>Domanda di oggi</h3>
<p id="domanda" style="font-size: 20px; font-weight: bold;"></p>

<textarea
id="risposta"
placeholder="Scrivi cosa pensi..."
style="width: 80%; max-width: 700px; height: 100px; padding: 10px; font-size: 16px;"
</textarea>

<br><br>

<button
onclick="salva()"
style="padding: 12px 24px; font-size: 16px; cursor: pointer;"

Salva
</button>

<p id="output" style="margin-top: 20px; font-weight: bold;"></p>

<hr style="margin: 40px 0;">

<p>
<a href="https://www.amazon.it/dp/B0GTWPFNXF" style="font-size: 22px;">
Le Molecole Gentili
</a>
</p>

<p>
<a href="https://github.com/CatterinaGiordano/le-molecole-gentili">
Repository del libro
</a>
</p>

<script>
const domande = [
"Perché qualcosa si muove?",
"Cosa succede se tutto si ferma?",
"Cosa cambia quando osservi davvero?",
"L’errore cosa ti sta dicendo?",
"Cosa tiene insieme le cose?"
];

document.getElementById("domanda").innerText =
domande[Math.floor(Math.random() * domande.length)];

function salva() {
const r = document.getElementById("risposta").value;
if (r.trim() !== "") {
localStorage.setItem("club_scienziati_gentili_risposta", r);
document.getElementById("output").innerText = "Salvato. Torna e continua.";
} else {
document.getElementById("output").innerText = "Scrivi qualcosa prima di salvare.";
}
}

const rispostaSalvata = localStorage.getItem("club_scienziati_gentili_risposta");
if (rispostaSalvata) {
document.getElementById("risposta").value = rispostaSalvata;
}
</script>

</body>
</html>
