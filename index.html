<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Club degli Scienziati Gentili</title>
</head>

<body style="font-family: Arial; text-align: center; padding: 40px; background:#f5f5f5;">

<h1>Club degli Scienziati Gentili</h1>

<p>Non serve iscrizione.</p>
<p>Non serve permesso.</p>
<p><strong>Serve solo una cosa:</strong></p>

<h2>non smettere di guardare davvero</h2>

<hr style="margin:40px">

<h3>Domanda di oggi</h3>
<p id="domanda"></p>

<textarea id="risposta" placeholder="Scrivi cosa pensi..." style="width:80%; height:100px;"></textarea>

<br><br>

<button onclick="salva()">Salva</button>

<p id="output"></p>

<hr style="margin:40px">

<p>
<a href="https://www.amazon.it/dp/B0GTWPFNXF">Le Molecole Gentili</a>
</p>

<script>
const domande = [
"Perché qualcosa si muove?",
"Cosa succede se tutto si ferma?",
"Cosa cambia quando osservi davvero?",
"L’errore cosa ti sta dicendo?",
"Cosa tiene insieme le cose?"
];

document.getElementById("domanda").innerText =
domande[Math.floor(Math.random() * domande.length)];

function salva() {
let r = document.getElementById("risposta").value;
if(r.trim() !== "") {
localStorage.setItem("risposta", r);
document.getElementById("output").innerText = "Salvato. Torna e continua.";
}
}
</script>

</body>
</html>
