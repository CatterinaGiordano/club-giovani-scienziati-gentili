<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Club dei Giovani Scienziati Gentili</title>

<style>
body {
font-family: Arial, sans-serif;
background: #f5f5f5;
margin: 0;
text-align: center;
}

.container {
max-width: 800px;
margin: 60px auto;
background: white;
padding: 40px;
box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h1 {
font-size: 32px;
}

h2 {
margin-top: 30px;
}

button {
margin-top: 20px;
padding: 15px 25px;
font-size: 16px;
border: none;
background: #111;
color: white;
cursor: pointer;
}

button:hover {
background: #333;
}

</style>
</head>

<body>

<div class="container">

<h1>Club dei Giovani Scienziati Gentili</h1>

<p>Non serve iscrizione.</p>
<p>Non serve permesso.</p>
<p><b>Serve solo una cosa:</b></p>

<h2>non smettere di guardare davvero</h2>

<hr>

<h2>Domanda di oggi</h2>

<button onclick="generaDomanda()">Scopri</button>

<p id="output"></p>

<hr>

<h2>Inizia da qui</h2>

<a href="https://www.amazon.it" target="_blank">
<button>Leggi Le Molecole Gentili</button>
</a>

</div>

<script>
function generaDomanda() {
const domande = [
"Perché le cose si muovono?",
"Che cos’è davvero una molecola?",
"Perché il cielo cambia colore?",
"Cosa significa osservare davvero?",
"La scienza è scoperta o invenzione?"
];

const scelta = domande[Math.floor(Math.random() * domande.length)];
document.getElementById("output").innerText = scelta;
}
</script>

</body>
</html>
